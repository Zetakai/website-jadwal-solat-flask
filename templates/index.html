<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Shalat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 122.88 121.4'%3E%3Cpath fill='%2310b981' d='M27.35,76.84h12.58c-9.18-17.91,10.88-21.53,18.94-32.08v-2.23c-0.73-0.13-1.46-0.39-2.16-0.8 c-1.56-0.9-2.56-2.22-3.02-3.94c-0.46-1.72-0.23-3.37,0.68-4.94c0.67-1.15,1.68-2.06,3.05-2.69c-1.66,1.88-2.78,3.14-2.04,5.93 c0.4,1.49,1.27,2.64,2.62,3.4c1.33,0.77,2.75,0.96,4.24,0.56c2.82-0.73,3.32-2.34,4.12-4.74l0,0c0.04,0.7,0.04,1.14,0.03,1.35 c-0.08,0.96-0.37,1.85-0.85,2.69c-0.89,1.55-2.21,2.56-3.93,3.01c-0.12,0.04-0.23,0.06-0.35,0.08v2.34 c8.31,11.3,27.44,14.42,18.93,32.04h12.7V63.14l-2.86-10.67h3.3v-10.7l7.27-21.89v-6.3c0-0.8,0.64-1.44,1.44-1.44 c0.8,0,1.44,0.64,1.44,1.44v5.34l7.72,22.85v10.7h3.67l-3.56,10.67v19.07c4.06-5.51,7.56-12.08,11.57-19.51l0,0 c-0.78,6.57-1.42,10.8-1.9,12.67c-2.3,8.8-6.4,16.75-12.26,23.81c-10.86,13.08-24.73,20.37-41.6,21.92 c-16.87,1.56-31.82-3.08-44.89-13.95C9.07,96.23,1.75,82.34,0.26,65.46c-1.48-16.88,3.27-31.94,14.27-45.19 C22.62,10.54,33.58,3.78,47.39,0C28.85,14.94,16.35,25.02,18.84,52.24C19.69,61.48,22.53,69.68,27.35,76.84L27.35,76.84z M60.04,34.5l0.94-1.63l-1.25-1.4l1.83,0.39l0.94-1.63l0.2,1.87l1.84,0.4l-1.72,0.76l0.2,1.87l-1.27-1.4L60.04,34.5L60.04,34.5 L60.04,34.5L60.04,34.5z M99.15,44.75h6.66v5.25h-6.66V44.75L99.15,44.75L99.15,44.75z'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #022c22 0%, #064e3b 25%, #065f46 50%, #064e3b 75%, #022c22 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #d1fae5;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .mosque-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(16,185,129,0.4);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(16,185,129,0.3); }
            50% { box-shadow: 0 0 60px rgba(16,185,129,0.5); }
        }
        .mosque-icon svg {
            width: 55px;
            height: 55px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ecfdf5;
            margin-bottom: 0.25rem;
            font-family: 'Scheherazade New', serif;
        }
        .header p {
            color: #6ee7b7;
            font-weight: 300;
            font-size: 0.9rem;
        }
        .bismillah {
            font-family: 'Scheherazade New', serif;
            font-size: 1.4rem;
            color: #a7f3d0;
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .card {
            background: rgba(6, 78, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }
        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6ee7b7;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-title svg {
            width: 16px;
            height: 16px;
            fill: #6ee7b7;
        }
        .select-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }
        .select-wrapper:last-child {
            margin-bottom: 0;
        }
        select {
            width: 100%;
            padding: 0.9rem 2.5rem 0.9rem 1rem;
            border: 1px solid rgba(16,185,129,0.4);
            border-radius: 12px;
            background: rgba(6, 78, 59, 0.6);
            color: #ecfdf5;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
        }
        select option {
            background: #022c22;
            color: #d1fae5;
        }
        .schedule-card {
            overflow: hidden;
        }
        .schedule-info {
            text-align: center;
            padding-bottom: 1.25rem;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(16,185,129,0.3);
        }
        .schedule-info .location {
            font-family: 'Scheherazade New', serif;
            font-size: 1.3rem;
            color: #a7f3d0;
            margin-bottom: 0.25rem;
        }
        .schedule-info .date {
            color: #6ee7b7;
            font-size: 0.85rem;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 0;
            border-bottom: 1px solid rgba(16,185,129,0.15);
            transition: all 0.2s ease;
        }
        .prayer-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .prayer-item:first-child {
            padding-top: 0;
        }
        .prayer-item:hover {
            background: rgba(16,185,129,0.1);
            margin: 0 -0.75rem;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
            border-radius: 10px;
        }
        .prayer-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .prayer-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, rgba(16,185,129,0.3), rgba(5,150,105,0.3));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .prayer-label {
            font-weight: 500;
            color: #d1fae5;
        }
        .prayer-time {
            font-family: 'Amiri', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #10b981;
        }
        .loading {
            text-align: center;
            padding: 2.5rem;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(16,185,129,0.2);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading p {
            color: #6ee7b7;
            font-size: 0.9rem;
        }
        .error {
            text-align: center;
            padding: 1.5rem;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            color: #fca5a5;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            color: #4ade80;
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .footer a {
            color: #6ee7b7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="mosque-icon">
                <svg viewBox="0 0 122.88 121.4" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#ecfdf5" d="M27.35,76.84h12.58c-9.18-17.91,10.88-21.53,18.94-32.08v-2.23c-0.73-0.13-1.46-0.39-2.16-0.8 c-1.56-0.9-2.56-2.22-3.02-3.94c-0.46-1.72-0.23-3.37,0.68-4.94c0.67-1.15,1.68-2.06,3.05-2.69c-1.66,1.88-2.78,3.14-2.04,5.93 c0.4,1.49,1.27,2.64,2.62,3.4c1.33,0.77,2.75,0.96,4.24,0.56c2.82-0.73,3.32-2.34,4.12-4.74l0,0c0.04,0.7,0.04,1.14,0.03,1.35 c-0.08,0.96-0.37,1.85-0.85,2.69c-0.89,1.55-2.21,2.56-3.93,3.01c-0.12,0.04-0.23,0.06-0.35,0.08v2.34 c8.31,11.3,27.44,14.42,18.93,32.04h12.7V63.14l-2.86-10.67h3.3v-10.7l7.27-21.89v-6.3c0-0.8,0.64-1.44,1.44-1.44 c0.8,0,1.44,0.64,1.44,1.44v5.34l7.72,22.85v10.7h3.67l-3.56,10.67v19.07c4.06-5.51,7.56-12.08,11.57-19.51l0,0 c-0.78,6.57-1.42,10.8-1.9,12.67c-2.3,8.8-6.4,16.75-12.26,23.81c-10.86,13.08-24.73,20.37-41.6,21.92 c-16.87,1.56-31.82-3.08-44.89-13.95C9.07,96.23,1.75,82.34,0.26,65.46c-1.48-16.88,3.27-31.94,14.27-45.19 C22.62,10.54,33.58,3.78,47.39,0C28.85,14.94,16.35,25.02,18.84,52.24C19.69,61.48,22.53,69.68,27.35,76.84L27.35,76.84z M60.04,34.5l0.94-1.63l-1.25-1.4l1.83,0.39l0.94-1.63l0.2,1.87l1.84,0.4l-1.72,0.76l0.2,1.87l-1.27-1.4L60.04,34.5L60.04,34.5 L60.04,34.5L60.04,34.5z M99.15,44.75h6.66v5.25h-6.66V44.75L99.15,44.75L99.15,44.75z"/>
                </svg>
            </div>
            <h1>Jadwal Shalat</h1>
            <p>Waktu sholat akurat untuk Anda</p>
        </div>

        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</div>

        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                Lokasi
            </div>
            <div class="select-wrapper">
                <select id="province">
                    <option value="">Pilih Provinsi</option>
                </select>
            </div>
            <div class="select-wrapper">
                <select id="city" disabled>
                    <option value="">Pilih Kabupaten/Kota</option>
                </select>
            </div>
        </div>

        <div id="schedule-card" class="card schedule-card" style="display: none;">
            <div class="schedule-info">
                <div class="location" id="location-text"></div>
                <div class="date" id="date-text"></div>
            </div>
            <div id="prayer-list"></div>
        </div>

        <div id="loading" class="card" style="display: none;">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Memuat jadwal shalat...</p>
            </div>
        </div>

        <div id="error" class="card" style="display: none;">
            <div class="error">
                <p id="error-text"></p>
            </div>
        </div>

        <div class="footer">
            Data dari <a href="https://equran.id" target="_blank">equran.id</a>
        </div>
    </div>

    <script>
        const provinceSelect = document.getElementById('province');
        const citySelect = document.getElementById('city');
        const scheduleCard = document.getElementById('schedule-card');
        const prayerList = document.getElementById('prayer-list');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorText = document.getElementById('error-text');
        const locationText = document.getElementById('location-text');
        const dateText = document.getElementById('date-text');

        const prayerEmoji = {
            'Subuh': '🌙',
            'Dzuhur': '☀️',
            'Ashar': '🌤️',
            'Maghrib': '🌅',
            'Isya': '✨'
        };

        const hariIndonesia = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const bulanIndonesia = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        async function fetchProvinces() {
            try {
                const res = await fetch('/api/provinces');
                const data = await res.json();
                const provinces = data.data || [];

                provinces.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p;
                    provinceSelect.appendChild(opt);
                });
            } catch (e) {
                showError('Gagal memuat provinsi');
            }
        }

        async function fetchCities(province) {
            citySelect.disabled = true;
            citySelect.innerHTML = '<option value="">Memuat...</option>';

            try {
                const res = await fetch('/api/cities', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provinsi: province })
                });
                const data = await res.json();
                const cities = data.data || [];

                citySelect.innerHTML = '<option value="">Pilih Kabupaten/Kota</option>';
                cities.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    citySelect.appendChild(opt);
                });
                citySelect.disabled = false;
            } catch (e) {
                showError('Gagal memuat kota');
            }
        }

        async function fetchSchedule(province, city) {
            showLoading();
            hideError();
            hideSchedule();

            try {
                const res = await fetch('/api/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provinsi: province,
                        kabkota: city,
                        bulan: new Date().getMonth() + 1,
                        tahun: new Date().getFullYear()
                    })
                });
                const data = await res.json();
                const jadwalArray = data.data?.jadwal || [];

                if (jadwalArray.length > 0) {
                    const today = new Date().getDate();
                    const todaySchedule = jadwalArray.find(s => s.tanggal === today) || jadwalArray[0];
                    displaySchedule(todaySchedule, data.data.provinsi, data.data.kabkota);
                } else {
                    showError('Jadwal tidak ditemukan');
                }
            } catch (e) {
                showError('Gagal memuat jadwal');
            }
        }

        function displaySchedule(schedule, provinsi, kabkota) {
            hideLoading();

            const date = new Date(schedule.tanggal_lengkap);
            const hari = hariIndonesia[date.getDay()];
            const tgl = date.getDate();
            const bulan = bulanIndonesia[date.getMonth()];
            const tahun = date.getFullYear();

            locationText.textContent = `${kabkota}, ${provinsi}`;
            dateText.textContent = `${hari}, ${tgl} ${bulan} ${tahun}`;

            prayerList.innerHTML = '';

            const prayers = [
                { name: 'Subuh', time: schedule.subuh },
                { name: 'Dzuhur', time: schedule.dzuhur },
                { name: 'Ashar', time: schedule.ashar },
                { name: 'Maghrib', time: schedule.maghrib },
                { name: 'Isya', time: schedule.isya }
            ];

            prayers.forEach(p => {
                const div = document.createElement('div');
                div.className = 'prayer-item';
                div.innerHTML = `
                    <div class="prayer-left">
                        <div class="prayer-icon">${prayerEmoji[p.name]}</div>
                        <span class="prayer-label">${p.name}</span>
                    </div>
                    <span class="prayer-time">${p.time}</span>
                `;
                prayerList.appendChild(div);
            });

            scheduleCard.style.display = 'block';
        }

        function showLoading() {
            hideSchedule();
            hideError();
            loadingEl.style.display = 'block';
        }

        function hideLoading() {
            loadingEl.style.display = 'none';
        }

        function showError(msg) {
            hideLoading();
            hideSchedule();
            errorText.textContent = msg;
            errorEl.style.display = 'block';
        }

        function hideError() {
            errorEl.style.display = 'none';
        }

        function hideSchedule() {
            scheduleCard.style.display = 'none';
        }

        provinceSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                fetchCities(val);
            } else {
                citySelect.innerHTML = '<option value="">Pilih Kabupaten/Kota</option>';
                citySelect.disabled = true;
                hideError();
                hideSchedule();
            }
        });

        citySelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                fetchSchedule(provinceSelect.value, val);
            } else {
                hideError();
                hideSchedule();
            }
        });

        fetchProvinces();
    </script>
</body>
</html>
